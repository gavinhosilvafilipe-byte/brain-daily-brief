name: Daily Brief Pipeline

on:
  schedule:
    - cron: '30 23 * * *'  # 23:30 UTC = 07:30 China (UTC+8)
  workflow_dispatch:        # Manual trigger

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
      ANTHROPIC_API_KEY:     ${{ secrets.ANTHROPIC_API_KEY }}
      SUPABASE_URL:          ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY:     ${{ secrets.SUPABASE_ANON_KEY }}
      NOTION_TOKEN:          ${{ secrets.NOTION_TOKEN }}
      NOTION_SETTINGS_DB_ID: ${{ secrets.NOTION_SETTINGS_DB_ID }}
      NOTION_QUEUE_DB_ID:    ${{ secrets.NOTION_QUEUE_DB_ID }}
      NOTION_OUTPUTS_DB_ID:  ${{ secrets.NOTION_OUTPUTS_DB_ID }}
      NOTION_BUDGET_DB_ID:   ${{ secrets.NOTION_BUDGET_DB_ID }}
      NEWSAPI_ORG_KEY:       ${{ secrets.NEWSAPI_ORG_KEY }}
      NEWSDATA_IO_KEY:       ${{ secrets.NEWSDATA_IO_KEY }}
      YOUTUBE_API_KEY:       ${{ secrets.YOUTUBE_API_KEY }}
      YOUTUBE_CHANNELS:      ${{ secrets.YOUTUBE_CHANNELS }}
      YOUTUBE_LOOKBACK_HOURS: '48'
      FIRECRAWL_API_KEY:     ${{ secrets.FIRECRAWL_API_KEY }}
      PORTFOLIO_TICKERS:     ${{ secrets.PORTFOLIO_TICKERS }}
      BIG_MOVE_THRESHOLD:    '3.0'
      GMAIL_CLIENT_ID:       ${{ secrets.GMAIL_CLIENT_ID }}
      GMAIL_CLIENT_SECRET:   ${{ secrets.GMAIL_CLIENT_SECRET }}
      GMAIL_REFRESH_TOKEN:   ${{ secrets.GMAIL_REFRESH_TOKEN }}
      RECIPIENT_EMAIL:       ${{ secrets.RECIPIENT_EMAIL }}
      OBSIDIAN_VAULT_PATH:   '/tmp/obsidian-outputs'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Ingest
        run: npm run ingest

      - name: Run Prices
        run: npm run prices

      - name: Run Analyze
        run: npm run analyze

      - name: Run Brief
        run: npm run brief

      - name: Upload outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-outputs-${{ github.run_id }}
          path: /tmp/obsidian-outputs/
          retention-days: 7
          if-no-files-found: ignore
