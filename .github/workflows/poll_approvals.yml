name: Poll Deep Dive Approvals

on:
  schedule:
    - cron: '*/15 * * * *'  # Every 15 minutes
  workflow_dispatch:

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      ANTHROPIC_API_KEY:     ${{ secrets.ANTHROPIC_API_KEY }}
      SUPABASE_URL:          ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY:     ${{ secrets.SUPABASE_ANON_KEY }}
      NOTION_TOKEN:          ${{ secrets.NOTION_TOKEN }}
      NOTION_QUEUE_DB_ID:    ${{ secrets.NOTION_QUEUE_DB_ID }}
      NOTION_OUTPUTS_DB_ID:  ${{ secrets.NOTION_OUTPUTS_DB_ID }}
      NOTION_BUDGET_DB_ID:   ${{ secrets.NOTION_BUDGET_DB_ID }}
      PORTFOLIO_TICKERS:     ${{ secrets.PORTFOLIO_TICKERS }}
      OBSIDIAN_VAULT_PATH:   '/tmp/obsidian-outputs'

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci

      - name: Check required secrets
        run: |
          MISSING=""
          [[ -z "${ANTHROPIC_API_KEY}" ]]  && MISSING="${MISSING} ANTHROPIC_API_KEY"
          [[ -z "${NOTION_TOKEN}" ]]        && MISSING="${MISSING} NOTION_TOKEN"
          [[ -z "${SUPABASE_URL}" ]]        && MISSING="${MISSING} SUPABASE_URL"
          [[ -z "${SUPABASE_ANON_KEY}" ]]   && MISSING="${MISSING} SUPABASE_ANON_KEY"
          [[ -z "${NOTION_QUEUE_DB_ID}" ]]  && MISSING="${MISSING} NOTION_QUEUE_DB_ID"
          if [[ -n "${MISSING}" ]]; then
            echo "::error::Missing required secrets:${MISSING}"
            echo "::error::Fix: repo Settings → Secrets and variables → Actions"
            exit 1
          fi
          echo "All required secrets present"

      - run: npm run poll
      - uses: actions/upload-artifact@v4
        with:
          name: deepdive-outputs-${{ github.run_id }}
          path: /tmp/obsidian-outputs/
          retention-days: 30
          if-no-files-found: ignore
